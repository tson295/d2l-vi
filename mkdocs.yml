site_name: Đắm mình vào Deep Learning (Tiếng Việt)
docs_dir: d2l-vi
site_dir: site

theme:
  name: material
  language: vi
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Chuyển sang tối
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Chuyển sang sáng
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - admonition
  - toc:
      permalink: true

extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

